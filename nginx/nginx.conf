load_module modules/ngx_http_modsecurity_module.so;

worker_processes 2;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    #include /etc/nginx/waf.conf;

    #include /etc/modsecurity.d/*.conf;
    #include /etc/modsecurity.d/owasp-crs/crs-setup.conf;
    #include /etc/modsecurity.d/owasp-crs/rules/*.conf;
    #include /etc/modsecurity.d/modsecurity-override.conf;
	modsecurity on;
	modsecurity_rules_file /etc/nginx/modsecurity.conf;


    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    log_format main_json escape=json '{'
        '"timestamp": "$time_iso8601", '
        '"time_local": "$time_local", '
        '"remote_addr": "$remote_addr", '
        '"remote_user": "$remote_user", '
        '"request_method": "$request_method", '
        '"request_uri": "$request_uri", '
        '"server_protocol": "$server_protocol", '
        '"status": "$status", '
        '"body_bytes_sent": "$body_bytes_sent", '
        '"request_time": "$request_time", '
        '"http_referer": "$http_referer", '
        '"http_user_agent": "$http_user_agent", '
        '"http_x_forwarded_for": "$http_x_forwarded_for", '
        '"upstream_addr": "$upstream_addr", '
        '"upstream_status": "$upstream_status", '
        '"upstream_response_time": "$upstream_response_time", '
        '"upstream_connect_time": "$upstream_connect_time", '
        '"upstream_header_time": "$upstream_header_time", '
        '"server_name": "$server_name", '
        '"request_length": "$request_length", '
        '"bytes_sent": "$bytes_sent", '
        '"connection": "$connection", '
        '"connection_requests": "$connection_requests", '
        '"msec": "$msec", '
        '"ssl_protocol": "$ssl_protocol", '
        '"ssl_cipher": "$ssl_cipher", '
        '"host": "$host", '
        '"component": "nginx"'
    '}';
    access_log /var/log/nginx/access.log main_json buffer=512k flush=1m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 75s;
    keepalive_requests 1000;
    send_timeout 15s;
    reset_timedout_connection on;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    upstream app_backend {
        server web-app:3000;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    server {
        listen 80 default_server reuseport;
        listen [::]:80 default_server reuseport;
        server_name _;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl default_server reuseport;
        listen [::]:443 ssl default_server reuseport;
        server_name _;
        http2 on;
        ssl_certificate /etc/nginx/ssl/certificate.pem;
        ssl_certificate_key /etc/nginx/ssl/private-key.pem;
        root /var/www/html;
        index index.html;
        location /js/ {
            alias /var/www/html/js/;
            add_header Content-Type application/javascript;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        location /css/ {
            alias /var/www/html/css/;
            add_header Content-Type text/css;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        location /health {
            access_log /var/log/health-access.log main_json;
            proxy_pass http://app_backend;
			include proxy-headers.conf;
            proxy_connect_timeout 3s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            limit_except GET {
				deny all;
			}
        }
        location /auth/github {
            limit_req zone=auth burst=5 nodelay;
            access_log /var/log/auth-access.log main_json;
            proxy_pass http://app_backend;
			include proxy-headers.conf;
        }
        location /api {
            limit_req zone=api burst=20 nodelay;
            access_log /var/log/api-access.log main_json;
            proxy_pass http://app_backend;
			include proxy-headers.conf;
        }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            try_files $uri @backend;
        }
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://app_backend;
			include proxy-headers.conf;
        }
        location @backend {
            proxy_pass http://app_backend;
			include proxy-headers.conf;
        }

    }
}
