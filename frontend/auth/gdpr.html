<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="gdpr.title"></title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="icon" href="/icon.png">
</head>
<body>
    <div class="container">
        <span class="security-badge" data-i18n="gdpr.compliance"></span>
        <h1 data-i18n="gdpr.title"></h1>
        <p class="subtitle" data-i18n="gdpr.subtitle"></p>

        <div class="gdpr-section">
            <h2 data-i18n="gdpr.personalData"></h2>
            <div id="userDataSummary" class="data-summary">
                <p data-i18n="gdpr.loadingData"></p>
            </div>
            <button class="btn btn-secondary" onclick="exportUserData()" data-i18n="gdpr.exportData"></button>
        </div>

        <div class="gdpr-section">
            <h2 data-i18n="gdpr.privacyPreferences"></h2>
            <form id="consentForm" class="consent-form">
                <div class="consent-item">
                    <label class="consent-checkbox">
                        <input type="checkbox" name="dataProcessing" id="dataProcessing">
                        <span class="checkmark"></span>
                        <span data-i18n="gdpr.dataProcessing"></span>
                    </label>
                </div>
                <div class="consent-item">
                    <label class="consent-checkbox">
                        <input type="checkbox" name="marketingEmails" id="marketingEmails">
                        <span class="checkmark"></span>
                        <span data-i18n="gdpr.marketingEmails"></span>
                    </label>
                </div>
                <div class="consent-item">
                    <label class="consent-checkbox">
                        <input type="checkbox" name="analytics" id="analytics">
                        <span class="checkmark"></span>
                        <span data-i18n="gdpr.analytics"></span>
                    </label>
                </div>
                <button type="submit" class="btn" data-i18n="gdpr.savePreferences"></button>
            </form>
        </div>

        <div class="gdpr-section">
            <h2 data-i18n="gdpr.anonymization"></h2>
            <p data-i18n="gdpr.anonymizationDesc"></p>
            <ul>
                <li data-i18n="gdpr.anonymizationList.0"></li>
                <li data-i18n="gdpr.anonymizationList.1"></li>
                <li data-i18n="gdpr.anonymizationList.2"></li>
            </ul>
            <button class="btn btn-warning" onclick="showAnonymizeConfirmation()" data-i18n="gdpr.anonymizeData"></button>
        </div>

        <div class="gdpr-section">
            <h2 data-i18n="gdpr.accountDeletion"></h2>
            <p data-i18n="gdpr.deletionDesc"></p>
            <ul>
                <li data-i18n="gdpr.deletionList.0"></li>
                <li data-i18n="gdpr.deletionList.1"></li>
                <li data-i18n="gdpr.deletionList.2"></li>
            </ul>
            <button class="btn btn-danger" onclick="showDeleteConfirmation()" data-i18n="gdpr.deleteAccount"></button>
        </div>

        <div class="navigation-section">
            <a href="/auth/profile" class="btn btn-secondary" data-i18n="common.back"></a>
        </div>
        <div id="message" style="margin-top: 20px;"></div>
    </div>

    <!-- Modal de Confirmación para Anonimización -->
    <div id="anonymizeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 data-i18n="gdpr.anonymizeConfirmation"></h3>
            <p data-i18n="gdpr.anonymizeConfirmText"></p>
            <ul>
                <li data-i18n="gdpr.anonymizeDetails.0"></li>
                <li data-i18n="gdpr.anonymizeDetails.1"></li>
                <li data-i18n="gdpr.anonymizeDetails.2"></li>
                <li data-i18n="gdpr.anonymizeDetails.3"></li>
            </ul>
            <p><strong data-i18n="gdpr.accountRemains"></strong></p>
            <div class="modal-actions">
                <button id="confirmAnonymizeBtn" class="btn btn-warning" data-i18n="gdpr.yesAnonymize"></button>
                <button onclick="hideAnonymizeConfirmation()" class="btn btn-secondary" data-i18n="common.cancel"></button>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación para Eliminación -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 data-i18n="gdpr.deletionConfirmation"></h3>
            <p data-i18n="gdpr.deletionWarning"></p>
            <p><strong data-i18n="gdpr.irreversible"></strong></p>
            <p data-i18n="gdpr.typeConfirmation"></p>
            <p><code data-i18n="gdpr.deleteConfirmationText"></code></p>
            <div class="form-group">
                <input type="text" id="deleteConfirmationInput" placeholder="" style="width: 100%;">
            </div>
            <div class="modal-actions">
                <button id="confirmDeleteBtn" class="btn btn-danger" disabled data-i18n="gdpr.deleteButton"></button>
                <button onclick="hideDeleteConfirmation()" class="btn btn-secondary" data-i18n="common.cancel"></button>
            </div>
        </div>
    </div>

    <script src="/js/language-manager.js"></script>
    <script type="module">
        import {
            loadUserData,
            exportUserData,
            displayUserData,
            showMessage,
            setupConsentForm,
            showDeleteConfirmation,
            hideDeleteConfirmation,
            deleteAccount,
            showAnonymizeConfirmation,
            hideAnonymizeConfirmation,
            anonymizeUserData,
            loadUserConsent
        } from '/js/gdpr-core.js';



        document.addEventListener('DOMContentLoaded', async function() {
            if (window.languageManager && window.languageManager.renderLanguageSelector) {
                window.languageManager.renderLanguageSelector('.container');
            }
            await loadUserData();
            await setupConsentForm();
        });
    </script>
</body>
</html>
