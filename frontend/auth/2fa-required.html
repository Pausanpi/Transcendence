<!DOCTYPE html>
<html>
<head>
    <title data-i18n="2fa.verificationRequired"></title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="icon" href="/icon.png">
</head>
<body>
    <div class="container">
        <h2 data-i18n="2fa.verificationRequired"></h2>
        <p data-i18n="2fa.enterCodePrompt"></p>
        <form id="2faForm">
            <div class="form-group">
                <input type="text" id="tokenInput" name="token" data-i18n-placeholder="2fa.sixDigitCode" maxlength="6" required pattern="[0-9]{6}" title="6-digit code" autocomplete="off">
            </div>
            <button type="submit" class="btn" data-i18n="2fa.verify"></button>
        </form>
        <div class="section" style="margin-top: 20px;">
            <h3 data-i18n="2fa.recoveryOptions"></h3>
            <p data-i18n="2fa.useBackupCode"></p>
            <button class="btn btn-secondary" onclick="showBackupCodeInput()" data-i18n="2fa.useBackupCodeBtn"></button>
        </div>
        <div id="backupCodeSection" class="section" style="display: none;">
            <h3 data-i18n="2fa.enterBackupCode"></h3>
            <form id="backupCodeForm">
                <div class="form-group">
					<input type="text" id="backupCode" name="backupCode" data-i18n-placeholder="2fa.backupCodePlaceholder" maxlength="9" required title="Formato: ABCDE-FGH" autocomplete="off">
                </div>
                <button type="submit" class="btn" data-i18n="2fa.verifyBackupCode"></button>
                <button type="button" class="btn btn-secondary" onclick="hideBackupCodeInput()" data-i18n="common.cancel"></button>
            </form>
        </div>
        <div id="message" style="margin-top: 20px;"></div>
    </div>

    <script src="/js/language-manager.js"></script>
    <script type="module">
        import { showBackupCodeInput, hideBackupCodeInput, showMessage, verify2FAToken } from '/js/2fa-core.js';

        window.showBackupCodeInput = showBackupCodeInput;
        window.hideBackupCodeInput = hideBackupCodeInput;
        window.showMessage = showMessage;

        document.addEventListener('DOMContentLoaded', async function() {
            if (window.languageManager && window.languageManager.renderLanguageSelector) {
                window.languageManager.renderLanguageSelector('.container');
            }

            document.getElementById('2faForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await verify2FAToken(false);
            });

            document.getElementById('backupCodeForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await verify2FAToken(true);
            });

            document.getElementById('backupCode').addEventListener('input', (e) => {
                let value = e.target.value.replace(/[^0-9]/g, '');
                if (value.length > 5) {
                    value = value.substr(0, 5) + '-' + value.substr(5, 3);
                }
                e.target.value = value;
            });

            document.getElementById('tokenInput').focus();
        });
    </script>
</body>
</html>
