<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title data-i18n="profile.title"></title>
	<link rel="stylesheet" href="/css/common.css">
	<link rel="icon" href="/icon.png">
</head>

<body>
	<div class="container">
		<span class="security-badge" data-i18n="common.securityBadge"></span>
		<div class="profile-header">
			<h1><span data-i18n="common.welcome"></span> <span id="username"></span></h1>
			<img id="userAvatar" class="user-avatar" src="" alt="Avatar">
		</div>
		<div class="profile-info">
			<p><strong data-i18n="profile.user"></strong> <span id="userUsername"></span></p>
			<p><strong data-i18n="profile.email"></strong> <span id="userEmail"></span></p>
			<p><strong data-i18n="profile.id"></strong> <span id="userId"></span></p>
			<p><strong data-i18n="profile.2fa"></strong> <span id="user2FAStatus"></span></p>

		</div>

		<div style="margin-top: 20px;">
			<a href="/game" class="btn btn-game" data-i18n="profile.playGame"></a>
			<a href="/2fa/management" class="btn" id="2faBtn" data-i18n="profile.configure2FA"></a>
			<a href="/gdpr/management" class="btn btn-secondary" data-i18n="profile.privacyData"></a>
			<a target="_blank" href="/users/decode.html" class="btn btn-warning">GEN TOPT DELETEME</a>
			<a href="/users/users.html" class="btn btn-warning">ADMIN DELETEME</a>
			<a href="/auth/logout" class="btn btn-danger" data-i18n="common.logout"></a>

		</div>

		<div class="jwt-token">
			<strong data-i18n="profile.jwtToken"></strong>
			<div id="jwtToken"></div>
		</div>

	</div>

	<script src="/js/language-manager.js"></script>
	<script type="module">
		import { loadUserProfile, displayUserData, showErrorMessage } from '/js/profile-core.js';

		window.displayUserData = displayUserData;
		window.showErrorMessage = showErrorMessage;

		document.addEventListener('DOMContentLoaded', async function () {
			await loadUserProfile();
		});

		if (window.languageManager && window.languageManager.renderLanguageSelector) {
			window.languageManager.renderLanguageSelector('.container');
		}
	</script>
</body>

</html>
