<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Secure App</title>
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/admin.css">
<link rel="icon" href="/icon.png">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 Admin Panel</h1>
            <p class="subtitle">Manage system users and access</p>
        </header>

        <div class="admin-content">
            <!-- Herramientas externas -->
            <div class="external-tools">
                <h2>External Tools</h2>
                <div class="tool-buttons">
                    <button onclick="window.open('https://localhost:8445', '_blank')"
                            class="btn btn-secondary" title="Open Grafana Dashboard">
                        📊 Grafana
                    </button>
                    <button onclick="window.open('https://localhost:8444', '_blank')"
                            class="btn btn-secondary" title="Open HashiCorp Vault">
                        🔐 Vault
                    </button>

                </div>
            </div>

            <!-- Lista de usuarios -->
            <div class="users-section">
                <div class="section-header">
                    <h2>Users List</h2>
                    <button id="refreshUsers" class="btn btn-secondary">
                        🔄 Refresh
                    </button>
                </div>

                <div id="usersTableContainer">
                    <div id="loadingMessage" class="loading">
                        Loading users...
                    </div>
                    <div id="usersTable" class="users-table" style="display: none;"></div>
                </div>
            </div>

            <!-- Botón volver -->
            <div class="action-buttons">
                <button onclick="window.location.href='/auth/profile'" class="btn btn-secondary">
                    ← Back to Profile
                </button>
            </div>
        </div>
    </div>

    <script src="/js/admin-users.js"></script>
</body>
</html>
