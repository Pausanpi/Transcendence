services:

  nginx-waf:
    image: nginx-waf
    build:
      context: nginx
      dockerfile: Dockerfile
    container_name: nginx-waf
    ports: ["880:80", "8443:443"]
    environment:
      MODSECURITY_ENABLED: 1
      MODSECURITY: "on"
      MODSEC_RULE_ENGINE: "on"
      MODSEC_AUDIT_ENGINE: "on"
      MODSEC_REQ_BODY_ACCESS: "on"
      BLOCKING_PARANOIA: 2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./backend/ssl:/etc/nginx/ssl
      - ./grafana/logs/nginx:/var/log/nginx
      - ./grafana/logs:/var/log/app_logs
    depends_on:
      - web-app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [transcendence-net]
    restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports: ["8200:8200"]
    environment:
      TZ: "Europe/Madrid"
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_LOCAL_CONFIG: |
        disable_mlock = true
        ui = true
        storage "file" { path = "/vault/data" }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = 1
        }
        api_addr = "http://vault:8200"
    cap_add: [IPC_LOCK]
    volumes:
      - vault-data:/vault/data
      - ./grafana/logs/vault:/vault/logs
    command: >
      sh -c "
        vault server -dev -dev-root-token-id=$$VAULT_DEV_ROOT_TOKEN_ID &&
        sleep 5 &&
        vault secrets enable -path=secret kv-v2 &&
        vault policy write app /vault/policies/app-policy.hcl &&
        vault kv put secret/oauth/github client_id=$$GITHUB_CLIENT_ID client_secret=$$GITHUB_CLIENT_SECRET &&
        vault kv put secret/session/config secret=$$SESSION_SECRET &&
        vault kv put secret/database/redis url=redis://redis:6379
      "
    networks: [transcendence-net]
    healthcheck:
      test: ["CMD-SHELL", "vault status > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
      - ./grafana/logs/redis:/var/log/redis
    networks: [transcendence-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  web-app:
    image: web-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-app
    environment:
      NODE_ENV: production
      PORT: 3000
      HTTPS_PORT: 3443
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      BASE_URL: http://localhost
      SESSION_SECRET: ${SESSION_SECRET}
    ports: ["3000:3000", "3443:3443"]
    depends_on:
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./package.json:/app/package.json
      - ./data:/app/data
      - ./backend/ssl:/app/ssl
      - ./grafana/logs:/app/logs
    networks: [transcendence-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      start_interval: 5s

volumes:
  vault-data:
    name: vault-data
  redis-data:
    name: redis-data

networks:
  transcendence-net:
    name: transcendence-net
    driver: bridge
    enable_ipv6: false
